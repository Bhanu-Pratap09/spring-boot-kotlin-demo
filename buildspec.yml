version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: springboot-app
    AWS_DEFAULT_REGION: us-east-1

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI

  build:
    commands:
      - chmod +x gradlew
      - ./gradlew build -x test
      - ls -R
      - docker build -t $IMAGE_REPO_NAME .
      - docker tag $IMAGE_REPO_NAME:latest $ECR_URI:latest

  post_build:
    commands:
      - docker push $ECR_URI:latest
      - echo '[{"name":"springboot-container","imageUri":"'"$ECR_URI"':latest"}]' > imagedefinitions.json
      - cat imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
